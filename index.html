<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="蝦皮文案">
<meta name="theme-color" content="#EE4D2D">
<link rel="manifest" href="/manifest.json">
<title>蝦皮文案產生器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --orange: #EE4D2D;
  --orange2: #FF6B4A;
  --bg: #F5F5F5;
  --card: #FFFFFF;
  --text: #1A1A1A;
  --text2: #666;
  --text3: #999;
  --border: #E8E8E8;
  --radius: 14px;
}
body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', sans-serif; min-height: 100vh; padding-bottom: 40px; }

/* Header */
.header { background: var(--orange); color: #fff; padding: 16px 20px 14px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(238,77,45,0.3); }
.header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }
.header p { font-size: 0.72rem; opacity: 0.85; margin-top: 2px; }

/* Steps */
.steps { display: flex; gap: 0; padding: 0 16px; margin: 16px 0 0; }
.step { flex: 1; text-align: center; font-size: 0.65rem; color: var(--text3); position: relative; }
.step.active { color: var(--orange); }
.step.done { color: #4CAF50; }
.step-num { width: 26px; height: 26px; border-radius: 50%; background: var(--border); color: var(--text3); font-size: 0.72rem; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 0 auto 4px; }
.step.active .step-num { background: var(--orange); color: #fff; }
.step.done .step-num { background: #4CAF50; color: #fff; }
.step-line { position: absolute; top: 13px; left: 50%; right: -50%; height: 2px; background: var(--border); z-index: -1; }
.step:last-child .step-line { display: none; }
.step.done .step-line { background: #4CAF50; }

/* Card */
.card { background: var(--card); border-radius: var(--radius); margin: 12px 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card-title { font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

/* Upload */
.upload-area { border: 2px dashed var(--border); border-radius: 10px; padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s; background: #FAFAFA; }
.upload-area:active { border-color: var(--orange); background: #FFF5F3; }
.upload-area.has-image { border-style: solid; border-color: var(--orange); padding: 0; overflow: hidden; }
.upload-area img { width: 100%; max-height: 240px; object-fit: cover; border-radius: 8px; display: block; }
.upload-icon { font-size: 2rem; margin-bottom: 8px; }
.upload-text { font-size: 0.8rem; color: var(--text2); }
.upload-hint { font-size: 0.7rem; color: var(--text3); margin-top: 4px; }

/* Input */
.input-label { font-size: 0.75rem; color: var(--text2); margin-bottom: 6px; display: block; }
.input-field { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 0.85rem; color: var(--text); outline: none; font-family: inherit; background: #FAFAFA; transition: border-color 0.2s; }
.input-field:focus { border-color: var(--orange); background: #fff; }

/* Style selector */
.style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.style-btn { border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 8px; text-align: center; cursor: pointer; transition: all 0.2s; background: #FAFAFA; }
.style-btn.selected { border-color: var(--orange); background: #FFF5F3; }
.style-btn .emoji { font-size: 1.3rem; display: block; margin-bottom: 3px; }
.style-btn .label { font-size: 0.72rem; font-weight: 600; color: var(--text); }
.style-btn .desc { font-size: 0.62rem; color: var(--text3); margin-top: 2px; }

/* Count */
.count-row { display: flex; align-items: center; gap: 12px; }
.count-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--card); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); }
.count-num { font-size: 1rem; font-weight: 700; color: var(--orange); min-width: 20px; text-align: center; }

/* Product info */
.product-card { background: #FFF5F3; border: 1.5px solid #FFD5CC; border-radius: 10px; padding: 12px; }
.product-name { font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.product-price { font-size: 0.9rem; font-weight: 700; color: var(--orange); margin-bottom: 8px; }
.product-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.product-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; background: rgba(238,77,45,0.1); color: var(--orange); }

/* Result */
.result-item { border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; background: #FAFAFA; position: relative; }
.result-label { font-size: 0.68rem; font-weight: 700; color: var(--orange); margin-bottom: 6px; }
.result-text { font-size: 0.82rem; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
.copy-btn { position: absolute; top: 10px; right: 10px; background: var(--orange); color: #fff; border: none; border-radius: 6px; padding: 4px 10px; font-size: 0.68rem; cursor: pointer; }
.copy-btn.copied { background: #4CAF50; }

/* Button */
.btn-main { width: 100%; padding: 14px; background: var(--orange); color: #fff; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; transition: opacity 0.2s; }
.btn-main:disabled { opacity: 0.5; }
.btn-main:active { opacity: 0.85; }
.btn-sec { width: 100%; padding: 12px; background: var(--card); color: var(--orange); border: 1.5px solid var(--orange); border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-top: 8px; }

/* Loading */
.loading { text-align: center; padding: 20px; color: var(--text2); font-size: 0.82rem; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 0.78rem; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

.hidden { display: none; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>🛍️ 蝦皮文案產生器</h1>
  <p>上傳截圖 → AI 辨識商品 → 生成 Threads 文案</p>
</div>

<!-- Steps -->
<div class="steps">
  <div class="step active" id="step1">
    <div class="step-num">1</div>
    <div>上傳截圖</div>
    <div class="step-line"></div>
  </div>
  <div class="step" id="step2">
    <div class="step-num">2</div>
    <div>確認商品</div>
    <div class="step-line"></div>
  </div>
  <div class="step" id="step3">
    <div class="step-num">3</div>
    <div>生成文案</div>
    <div class="step-line"></div>
  </div>
</div>

<!-- Step 1: 上傳截圖 -->
<div id="section-upload">
  <div class="card">
    <div class="card-title">📸 上傳商品截圖</div>
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">🖼️</div>
      <div class="upload-text">點擊上傳蝦皮商品截圖</div>
      <div class="upload-hint">支援 JPG、PNG、截圖皆可</div>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="onImageSelected(event)">
  </div>

  <div class="card">
    <div class="card-title">🔗 分潤連結（選填）</div>
    <label class="input-label">貼上你的蝦皮分潤推廣連結</label>
    <input type="url" class="input-field" id="promo-link" placeholder="https://s.shopee.tw/xxxx">
  </div>

  <div style="margin: 0 16px">
    <button class="btn-main" id="analyze-btn" onclick="analyzeImage()" disabled>🔍 AI 辨識商品</button>
  </div>
</div>

<!-- Step 2: 商品確認 + 設定 -->
<div id="section-product" class="hidden">
  <div class="card">
    <div class="card-title">✅ 辨識結果</div>
    <div class="product-card" id="product-display"></div>
    <button class="btn-sec" onclick="backToUpload()">↩ 重新上傳</button>
  </div>

  <div class="card">
    <div class="card-title">✍️ 選擇文案風格</div>
    <div class="style-grid">
      <div class="style-btn selected" data-style="casual" onclick="selectStyle(this)">
        <span class="emoji">💬</span>
        <div class="label">閒聊推薦</div>
        <div class="desc">像朋友分享好物</div>
      </div>
      <div class="style-btn" data-style="hype" onclick="selectStyle(this)">
        <span class="emoji">🔥</span>
        <div class="label">限時搶購</div>
        <div class="desc">製造急迫感</div>
      </div>
      <div class="style-btn" data-style="review" onclick="selectStyle(this)">
        <span class="emoji">⭐</span>
        <div class="label">開箱心得</div>
        <div class="desc">真實使用者分享</div>
      </div>
      <div class="style-btn" data-style="story" onclick="selectStyle(this)">
        <span class="emoji">📖</span>
        <div class="label">說故事</div>
        <div class="desc">從生活情境出發</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📝 生成幾則文案</div>
    <div class="count-row">
      <button class="count-btn" onclick="changeCount(-1)">−</button>
      <span class="count-num" id="count-display">3</span>
      <button class="count-btn" onclick="changeCount(1)">＋</button>
      <span style="font-size:0.75rem;color:var(--text3)">則（最多5則）</span>
    </div>
  </div>

  <div style="margin: 0 16px">
    <button class="btn-main" onclick="generateCopy()">✨ 生成文案</button>
  </div>
</div>

<!-- Step 3: 文案結果 -->
<div id="section-result" class="hidden">
  <div class="card">
    <div class="card-title">🎉 生成完成</div>
    <div id="result-list"></div>
    <button class="btn-sec mt12" onclick="regenerate()">🔄 重新生成</button>
    <button class="btn-sec" onclick="backToUpload()" style="margin-top:6px">🏠 重新開始</button>
  </div>
</div>

<!-- Loading -->
<div id="loading-section" class="hidden">
  <div class="card">
    <div class="loading">
      <div class="spinner"></div>
      <div id="loading-text">AI 辨識中...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BACKEND = 'https://shopee-api-y1vv.onrender.com';
let currentImage = null;
let currentImageType = 'image/jpeg';
let currentProduct = null;
let currentStyle = 'casual';
let currentCount = 3;

// ── 圖片選擇 ──
function onImageSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  currentImageType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = (ev) => {
    const base64 = ev.target.result.split(',')[1];
    currentImage = base64;
    const area = document.getElementById('upload-area');
    area.classList.add('has-image');
    area.innerHTML = `<img src="${ev.target.result}" alt="商品截圖">`;
    document.getElementById('analyze-btn').disabled = false;
  };
  reader.readAsDataURL(file);
}

// ── Step 1：辨識商品 ──
async function analyzeImage() {
  if (!currentImage) return;
  showLoading('🔍 AI 辨識商品中...');

  try {
    const r = await fetch(`${BACKEND}/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: currentImage,
        image_type: currentImageType,
        link: document.getElementById('promo-link').value.trim()
      })
    });
    const d = await r.json();
    if (!d.success) { showToast('❌ ' + d.error); hideLoading(); return; }

    currentProduct = d.product;
    showProductInfo(d.product);
    goToStep(2);
  } catch(e) {
    showToast('❌ 連線失敗，請稍後再試');
  }
  hideLoading();
}

function showProductInfo(p) {
  const tags = [...(p.key_features||[]), ...(p.selling_points||[])].slice(0, 5);
  document.getElementById('product-display').innerHTML = `
    <div class="product-name">${p.name || '未辨識到商品名稱'}</div>
    ${p.price ? `<div class="product-price">${p.price}</div>` : ''}
    <div class="product-tags">
      ${p.category ? `<span class="product-tag">📦 ${p.category}</span>` : ''}
      ${tags.map(t => `<span class="product-tag">${t}</span>`).join('')}
    </div>
    ${p.target_audience ? `<div style="font-size:0.7rem;color:var(--text3);margin-top:8px">👥 ${p.target_audience}</div>` : ''}
  `;
}

// ── Step 2：生成文案 ──
function selectStyle(el) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  currentStyle = el.dataset.style;
}

function changeCount(d) {
  currentCount = Math.max(1, Math.min(5, currentCount + d));
  document.getElementById('count-display').textContent = currentCount;
}

async function generateCopy() {
  if (!currentProduct) return;
  showLoading('✨ AI 生成文案中...');

  try {
    const r = await fetch(`${BACKEND}/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        product: currentProduct,
        style: currentStyle,
        count: currentCount
      })
    });
    const d = await r.json();
    if (!d.success) { showToast('❌ ' + d.error); hideLoading(); return; }

    showResults(d.result);
    goToStep(3);
  } catch(e) {
    showToast('❌ 連線失敗，請稍後再試');
  }
  hideLoading();
}

function showResults(text) {
  const items = text.split(/【文案\d+】/).filter(t => t.trim());
  document.getElementById('result-list').innerHTML = items.map((item, i) => `
    <div class="result-item">
      <div class="result-label">文案 ${i+1}</div>
      <div class="result-text">${item.trim()}</div>
      <button class="copy-btn" onclick="copyText(this, ${i})">複製</button>
    </div>
  `).join('');
}

function copyText(btn, idx) {
  const texts = document.querySelectorAll('.result-text');
  const text = texts[idx]?.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ 已複製';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 2000);
  });
}

function regenerate() { generateCopy(); }

// ── 導航 ──
function goToStep(n) {
  document.getElementById('section-upload').classList.toggle('hidden', n !== 1);
  document.getElementById('section-product').classList.toggle('hidden', n !== 2);
  document.getElementById('section-result').classList.toggle('hidden', n !== 3);
  [1,2,3].forEach(i => {
    const el = document.getElementById('step'+i);
    el.classList.remove('active','done');
    if (i < n) el.classList.add('done');
    if (i === n) el.classList.add('active');
  });
  window.scrollTo(0, 0);
}

function backToUpload() {
  currentImage = null; currentProduct = null;
  document.getElementById('upload-area').classList.remove('has-image');
  document.getElementById('upload-area').innerHTML = `
    <div class="upload-icon">🖼️</div>
    <div class="upload-text">點擊上傳蝦皮商品截圖</div>
    <div class="upload-hint">支援 JPG、PNG、截圖皆可</div>`;
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('file-input').value = '';
  goToStep(1);
}

// ── UI helpers ──
function showLoading(text) {
  document.getElementById('loading-text').textContent = text;
  document.getElementById('loading-section').classList.remove('hidden');
  document.getElementById('section-upload').classList.add('hidden');
  document.getElementById('section-product').classList.add('hidden');
  document.getElementById('section-result').classList.add('hidden');
}
function hideLoading() {
  document.getElementById('loading-section').classList.add('hidden');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
